# 知识库助手 - 配置文件
# 覆盖 .env 中的默认值

# ⚠️ 模型名称（LLM / Embedding）在 .env 里配置，这里不要重复定义。
#    这里的 setting 只覆盖 .env 中不存在的参数（temperature、chunk_size 等）。
#    Load order: 代码默认值 < .env < settings.yaml（后者最高优先级）

llm:
  temperature: 0.7
  max_tokens: 4096
  streaming: true

memory:
  # 短期记忆：最近 N 轮对话
  short_term_max_turns: 20
  # 长期记忆：向量检索 Top-K
  long_term_top_k: 5
  # 用户画像：更新阈值（相似度 > 此值视为已存在）
  profile_similarity_threshold: 0.85

knowledge:
  # 文档切片大小
  chunk_size: 1000
  chunk_overlap: 200
  # 检索 Top-K
  retrieval_top_k: 5

retry:
  max_retries: 3
  initial_delay: 1.0
  backoff_factor: 2.0
