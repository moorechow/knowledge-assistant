# ============================================================
# docker-compose.yml — 知识库助手一键部署
#
# 启动:  docker compose up -d
# 查看:  docker compose logs -f
# 停止:  docker compose down
# ============================================================

services:
  # ---- 知识库助手主服务 ----
  app:
    build: .
    image: knowledge-assistant:latest
    container_name: knowledge-assistant
    restart: always
    ports:
      - "8501:8501"
    environment:
      - HF_ENDPOINT=https://hf-mirror.com
    env_file:
      - .env
    volumes:
      # 数据持久化：知识库向量 + 上传文档 + 用户画像 + 长期记忆
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---- Nginx 反向代理（可选，生产环境推荐启用）----
  nginx:
    image: nginx:alpine
    container_name: knowledge-assistant-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    # 如果不想要 nginx，注释掉整个 nginx 段，
    # 然后直接把 app 的 ports 改成 "80:8501"
